apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadbalancer
  namespace: mini-cluster
  labels:
    app: loadbalancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadbalancer
  template:
    metadata:
      labels:
        app: loadbalancer
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-lb-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: nginx-lb-config
        configMap:
          name: nginx-lb-config
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: loadbalancer-service
  namespace: mini-cluster
spec:
  selector:
    app: loadbalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer
