apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: worker
  namespace: mini-cluster
  labels:
    app: worker
spec:
  serviceName: worker-service
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: html-volume
          mountPath: /var/www/html
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-worker-config
      - name: html-volume
        emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: mini-cluster
spec:
  selector:
    app: worker
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  clusterIP: None  # Headless service for StatefulSet
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: worker-nodeport
  namespace: mini-cluster
spec:
  selector:
    app: worker
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    nodePort: 30081
  type: NodePort
