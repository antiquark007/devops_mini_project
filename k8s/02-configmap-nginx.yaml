apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-worker-config
  namespace: mini-cluster
data:
  nginx.conf: |
    server {
        listen 80 default_server;
        server_name _;

        location / {
            root /var/www/html;
            index index.html;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-lb-config
  namespace: mini-cluster
data:
  nginx.conf: |
    upstream backend {
        least_conn;
        server worker-0.worker-service:80 weight=1;
        server worker-1.worker-service:80 weight=1;
    }

    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
